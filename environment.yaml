name: adhd-sim
channels:
  - conda-forge
  - defaults

dependencies:
  # Python version
  - python=3.10

  # Core dependencies
  - simpy>=4.0.0
  - numpy>=1.21.0
  - pandas>=1.3.0

  # Analysis
  - scipy>=1.7.0

  # Visualization
  - matplotlib>=3.4.0
  - seaborn>=0.11.0

  # Development and testing
  - pytest>=6.2.0
  - pytest-cov>=2.12.0
  - black>=21.5b0
  - flake8>=3.9.0
  - pylint>=2.9.0

  # Documentation
  - sphinx>=4.0.0

  # Pip dependencies (if any)
  - pip

pip_dependencies: []
